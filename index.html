<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <button id="theme-toggle" onclick="toggleTheme()" style="position:absolute;top:1rem;right:1rem;z-index:10;background:none;border:none;font-size:2rem;cursor:pointer" aria-label="Alternar tema"></button>
        <header class="profile-header">
            <h1>Quem está assistindo?</h1>
        </header>
        <section aria-label="Perfis disponíveis">
            <nav class="profiles">
                <ul>
                    <li>
                        <a href="catalogo/catalogo.html" class="profile" onclick="selectProfile('Hexagono', 'assets/perfil-1.png')">
                            <figure>
                                <img src="assets/perfil-1.png" alt="Um personagem de aparência gótica e caricata, com cabelos roxos e monóculo, posa em um cenário fantástico de miniaturas sombrias iluminadas por velas.">
                                <figcaption>Hexagono</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="catalogo/catalogo.html" class="profile" onclick="selectProfile('Paralelo', 'assets/perfil-2.png')">
                            <figure>
                                <img src="assets/perfil-2.png" alt="Imagem de um boné azul">
                                <figcaption>Paralelo</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="catalogo/catalogo.html" class="profile" onclick="selectProfile('Coendro', 'assets/perfil-3.png')">
                            <figure>
                                <img src="/assets/perfil-3.png" alt="Imagem de um boné azul">
                                <figcaption>Coendro</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="catalogo/catalogo.html" class="profile" onclick="selectProfile('Palindromo', 'assets/perfil-4.png')">
                            <figure>
                                <img src="/assets/perfil-4.png" alt="Imagem de um boné azul">
                                <figcaption>Palindromo</figcaption>
                            </figure>
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="manage-profile-rectangle">
                <button class="manage-profile-button" aria-label="Gerenciar Perfis">GERENCIAR PERFIS</button>
            </div>
        </section>
    </main>
    <script src="theme.js"></script>
</body>
</html>
